<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#F7F5EE;--card:#FBFBFB;--ink:#1E1E1E;--mut:#6E6E6E;--faint:#A39C8E;
  --line:#E0DDD3;--line2:#ECEAE2;--accent:#007484;--accent-d:#005763;--accent-soft:#E0EEF0;
  --navy:#284157;--gold:#CFB372;--gold-d:#A88E48;--gold-soft:#EFE6CD;
  --green:#2E8F5B;--green-bg:#E8F2EA;--green-bd:#BFE0CC;
  --amber:#C98A2C;--amber-bg:#F4EAD4;
  --red:#C8554C;--red-bg:#F6E7E2;--red-bd:#E9C3BB;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost','Futura PT','Futura',-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;font-feature-settings:"ss03","cv11"}
.tnum{font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}

/* header */
.top{background:rgba(247,245,238,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(12px);position:sticky;top:0;z-index:30}
.top .row{max-width:1640px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.brand .lg{width:34px;height:34px;border-radius:9px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;font-family:'Cormorant',Georgia,serif;box-shadow:inset 0 0 0 1px rgba(207,179,114,.4)}
.brand .nm{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:22px;letter-spacing:.02em;line-height:1;color:var(--navy)}
.brand .sb{font-size:11.5px;color:var(--mut)}
.top .back{margin-left:auto;font-size:13px;color:var(--mut);border:1px solid var(--line);background:var(--card);padding:8px 15px;border-radius:999px}
.top .back:hover{border-color:var(--accent);color:var(--accent)}

.wrap{max-width:1640px;margin:0 auto;padding:18px 22px 50px}
h1.title{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:30px;color:var(--navy);line-height:1.05;margin-bottom:4px}
.sub{font-size:13px;color:var(--mut);margin-bottom:16px}
.sub b{color:var(--ink)}

/* toolbar */
.bar-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:13px}
.tbtn{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:999px}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.zksw{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card);margin-right:6px}
.zksw a{padding:8px 15px;font-size:12.5px;font-weight:600;color:var(--mut)}
.zksw a:hover{color:var(--accent)}
.zksw a[aria-current="true"]{background:var(--navy);color:#fff}
.legend{display:flex;gap:13px;flex-wrap:wrap;align-items:center;font-size:11.5px;color:var(--mut);margin-left:auto}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.legend .sep{color:#cdd6df}
.legend .sumcap{display:inline-block;width:16px;height:6px;background:var(--navy);position:relative;vertical-align:0;margin-right:5px;border-radius:1px}

/* MS-Project grid */
.mpp{overflow:auto;max-height:78vh;border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:0 1px 2px rgba(30,30,30,.04);position:relative}
.mppgrid{width:max-content;min-width:100%}
.SHEET_W{width:540px}
.hd{display:flex;position:sticky;top:0;z-index:12;background:var(--card)}
.hd .sh{position:sticky;left:0;z-index:14;background:var(--card);border-right:2px solid var(--line);border-bottom:1px solid var(--line)}
.hd .tlh{position:relative;border-bottom:1px solid var(--line)}
.cols{display:flex;height:44px;align-items:flex-end}
.cols .c{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;padding:0 8px 7px;border-left:1px solid var(--line2);white-space:nowrap;align-self:stretch;display:flex;align-items:flex-end}
.cols .c.task{flex:1;border-left:none;padding-left:14px}
.cols .c.r{justify-content:flex-end}
/* year + month tiers */
.tier-y{height:22px;position:relative;border-bottom:1px solid var(--line2)}
.tier-y .yr{position:absolute;top:0;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);border-left:1px solid var(--line)}
.tier-m{height:22px;position:relative}
.tier-m .mo{position:absolute;top:0;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut);border-left:1px solid var(--line2)}

.bd{position:relative}
.grid{position:absolute;top:0;bottom:0;z-index:0;pointer-events:none}
.grid .gl{position:absolute;top:0;bottom:0;width:1px;background:var(--line2)}
.grid .gl.yr{background:var(--line)}
.grid .today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.8;transform:translateX(-1px)}
.grid .today b{position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fff;background:var(--red);border-radius:4px;padding:1px 5px;white-space:nowrap}

.r{display:flex;height:25px;position:relative;z-index:1}
.r:hover .s,.r:hover .t{background:#FAF7EF}
.r.hide{display:none}
.r .s{position:sticky;left:0;z-index:3;background:var(--card);display:flex;align-items:center;border-right:2px solid var(--line);border-bottom:1px solid var(--line2)}
.r .t{position:relative;border-bottom:1px solid var(--line2)}
/* sheet cells */
.s .nmcell{flex:1;display:flex;align-items:center;gap:5px;min-width:0;padding-right:8px}
.s .chev{width:11px;flex:none;font-size:9px;color:var(--faint);text-align:center;transition:transform .12s}
.s .nm{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r.l1 .nm{font-weight:700;color:var(--navy);font-size:12.5px}
.r.l2 .nm{font-weight:600;color:var(--ink)}
.r.l3 .nm{font-weight:400;color:var(--ink)}
.s .cc{flex:none;font-size:11px;color:var(--mut);padding:0 8px;border-left:1px solid var(--line2);height:100%;display:flex;align-items:center;justify-content:flex-end}
.s .cdur{width:48px}.s .cs{width:78px}.s .cf{width:78px}.s .cp{width:46px;font-weight:700}
.cp.done{color:var(--green)}.cp.late{color:var(--red)}.cp.prog{color:var(--accent-d)}.cp.idle{color:var(--faint)}
.r.collapsed .chev{transform:rotate(-90deg)}

/* bars */
.bar{position:absolute;top:6px;height:12px;border-radius:3px;border:1px solid;overflow:hidden}
.bar .pf{position:absolute;left:0;top:0;bottom:0}
.bar.done{background:var(--green-bg);border-color:var(--green-bd)}.bar.done .pf{background:var(--green)}
.bar.prog{background:var(--accent-soft);border-color:#B6D6DA}.bar.prog .pf{background:var(--accent)}
.bar.late{background:var(--red-bg);border-color:var(--red-bd)}.bar.late .pf{background:var(--red)}
.bar.idle{background:transparent;border:1px dashed #CFC8BA}
/* summary bracket */
.sum{position:absolute;top:8px;height:7px;background:var(--navy);border-radius:1px}
.sum.late{background:var(--red)}
.sum::before,.sum::after{content:'';position:absolute;top:0;width:0;height:0;border-top:7px solid currentColor}
.sum{color:var(--navy)}.sum.late{color:var(--red)}
.sum::before{left:-1px;border-right:5px solid transparent}
.sum::after{right:-1px;border-left:5px solid transparent}
.barlbl{position:absolute;top:5px;font-size:9.5px;color:var(--mut);white-space:nowrap;pointer-events:none}

.foot{font-size:11.5px;color:var(--faint);margin-top:14px;line-height:1.6}
.foot b{color:var(--mut)}
@media(max-width:760px){.title{font-size:24px}}
/* режим встраивания в панель (iframe) — прячем собственную шапку и заголовок */
html.embed .top,html.embed .title{display:none}
html.embed .wrap{padding:10px 18px 16px}
html.embed .mpp{max-height:76vh}
</style>
</head>

(function(){
const A=D.axis,MIN=Date.parse(A.min),MAX=Date.parse(A.max),DAY=86400000,TODAY=Date.parse(A.today);
const PXD=2.25, SHEET=540;
const W=Math.round((MAX-MIN)/DAY*PXD);
const X=iso=>Math.round((Date.parse(iso)-MIN)/DAY*PXD);
const MON=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const fmt=iso=>{const[y,m,d]=iso.split('-');return d+'.'+m+'.'+y.slice(2);};

// width plumbing
document.querySelectorAll('.SHEET_W').forEach(e=>e.style.width=SHEET+'px');

document.getElementById('grid').style.left=SHEET+'px';
document.getElementById('grid').style.width=W+'px';

// ----- time header tiers + gridlines -----
let ty='',tm='',gl='';
let cur=Date.UTC(new Date(MIN).getUTCFullYear(),new Date(MIN).getUTCMonth(),1);
const years={};
while(cur<=MAX){
  const dt=new Date(cur),y=dt.getUTCFullYear(),m=dt.getUTCMonth();
  const next=Date.UTC(y,m+1,1);
  const a=Math.max(cur,MIN),b=Math.min(next,MAX);
  const left=(a-MIN)/DAY*PXD,width=(b-a)/DAY*PXD;
  tm+=`<div class="mo" style="left:${left}px;width:${width}px">${MON[m]}</div>`;
  gl+=`<div class="gl${m===0?' yr':''}" style="left:${left}px"></div>`;
  years[y]=years[y]||{left:left,width:0};years[y].width+=width;
  cur=next;
}
Object.keys(years).forEach(y=>{ty+=`<div class="yr" style="left:${years[y].left}px;width:${years[y].width}px">${y}</div>`;});
document.getElementById('tierY').innerHTML=ty;
document.getElementById('tierM').innerHTML=tm;
const tx=(TODAY-MIN)/DAY*PXD;
gl+=`<div class="today" style="left:${tx}px"><b>сегодня</b></div>`;
document.getElementById('grid').innerHTML=gl;

const rows=[];

  const pid='p'+p.id;
  rows.push({id:pid,lvl:1,anc:[],summary:true,name:'Пятно '+p.id+' · '+p.q+'-я очередь',start:p.start,finish:p.finish,fact:p.fact,delay:p.delay,n:p.n});

function tstat(r){if(r.fact>=100)return'done';if(r.delay>0)return'late';if(r.fact>0)return'prog';return'idle';}

    </div>
    <div class="t" style="width:${W}px">${timeline}</div>
  </div>`);
});
bd.insertAdjacentHTML('beforeend',frag.join(''));
document.querySelectorAll('.r .s').forEach(e=>e.style.width=SHEET+'px');

// ----- collapse logic -----
const collapsed=new Set();
function applyVis(){
  document.querySelectorAll('.r').forEach(row=>{
    const anc=(row.dataset.anc||'').split(',').filter(Boolean);
    row.classList.toggle('hide',anc.some(a=>collapsed.has(a)));
    row.classList.toggle('collapsed',collapsed.has(row.dataset.id));
  });
}
document.querySelectorAll('.r').forEach(row=>{
  const sum=row.classList.contains('l1')||row.classList.contains('l2');
  if(!sum)return;
  row.querySelector('.s').addEventListener('click',()=>{
    const id=row.dataset.id;
    if(collapsed.has(id))collapsed.delete(id);else collapsed.add(id);
    applyVis();
  });
});
function setLevel(mode){ // 'all' | 'sections' (скрыть работы) | 'plots' (скрыть разделы и работы)
  collapsed.clear();
  if(mode!=='all') document.querySelectorAll('.r').forEach(row=>{
    if(mode==='plots'&&row.classList.contains('l1'))collapsed.add(row.dataset.id);
    if(mode==='sections'&&row.classList.contains('l2'))collapsed.add(row.dataset.id);
  });
  applyVis();
}
document.getElementById('expandAll').onclick=()=>setLevel('all');
document.getElementById('toSections').onclick=()=>setLevel('sections');
document.getElementById('toPlots').onclick=()=>setLevel('plots');

document.querySelectorAll('.zksw a[data-zk]').forEach(a=>{if(a.getAttribute('href')===location.pathname.split('/').pop())a.setAttribute('aria-current','true');});
})();
