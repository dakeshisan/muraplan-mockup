<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#284157">
<meta name="robots" content="noindex,nofollow">
<title>ATLAS · ГПР-движок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5EE;--card:#fff;--ink:#1E1E1E;--mut:#6E6E6E;--faint:#A39C8E;--line:#E6E2D7;--line2:#EFEDE5;
  --accent:#007484;--accent-d:#005763;--accent-soft:#E2EFF0;--navy:#284157;--navy-d:#1d3142;
  --gold:#CFB372;--gold-d:#A88E48;--green:#2E8F5B;--green-bg:#E8F2EA;--red:#C8554C;--red-bg:#F7E7E2;
  --amber:#C98A2B;--amber-bg:#F7EFDD;
  --shadow:0 14px 34px -20px rgba(40,65,87,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:light}
body{font-family:'Jost',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;font-feature-settings:"ss03","cv11";display:flex;flex-direction:column;height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.tnum{font-variant-numeric:tabular-nums}
.wrap{max-width:none;margin:0;padding:0 14px 56px}
.top{flex:none;z-index:20;background:linear-gradient(120deg,var(--navy),var(--navy-d));color:#fff;margin:0;padding:12px 22px;display:flex;align-items:center;gap:12px}
/* ===== app-shell: дерево слева + детали справа ===== */
.app{flex:1;display:flex;min-height:0}
.side{flex:none;width:300px;overflow-y:auto;border-right:1px solid var(--line);background:#fff;padding:8px 0 20px}
.main{flex:1;min-width:0;overflow-y:auto;padding:18px 26px 60px}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:pointer;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg)}
.nav-item.on{background:var(--accent-soft);border-left-color:var(--accent)}
.nav-root{font-weight:800;color:var(--navy);font-size:14px;padding:9px 12px;border-bottom:1px solid var(--line2);margin-bottom:4px}
.nav-o{font-weight:700;color:var(--navy)}
.nav-b{padding-left:30px;font-size:12.5px}
.nav-ic{font-size:13px;color:var(--accent-d)}
.nav-chev{flex:none;width:14px;text-align:center;color:var(--faint);font-weight:700;transition:transform .15s}
.nav-chev.rot{transform:rotate(90deg)}
.nav-nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-pct{flex:none;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent-d);font-size:12px}
.nav-lag{flex:none;font-size:10.5px;font-weight:700;color:var(--faint);width:34px;text-align:right}
.nav-lag.bad{color:var(--red)}
.nav-dot{flex:none;width:8px;height:8px;border-radius:50%;background:var(--green)}
.nav-dot.amber{background:var(--amber)}.nav-dot.red{background:var(--red)}.nav-dot.ok{background:var(--green)}
.nav-blocks{display:none}.nav-blocks.open{display:block}
/* фильтр в дереве */
.navf{padding:6px 8px 10px;border-bottom:1px solid var(--line2);margin-bottom:6px}
.navf input#navq{width:100%;font-family:inherit;font-size:12px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg)}
.navf input#navq:focus{outline:none;border-color:var(--accent);background:#fff}
.navc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);font-weight:600;margin-top:7px;cursor:pointer}
/* прогноз / клик-строки / список крит.работ */
.lk{cursor:pointer;color:var(--accent-d)}.lk:hover{text-decoration:underline}
.bnrow2.clk{cursor:pointer}.bnrow2.clk:hover{background:var(--accent-soft)}
.fccall{border-radius:11px;padding:10px 14px;font-size:13px;margin-bottom:14px;line-height:1.5;font-weight:600;border:1px solid}
.fccall.red{background:#F7E7E2;border-color:#e6b5ae;color:var(--red)}
.fccall.amber{background:#F7EFDD;border-color:#ecd9b0;color:#B5791F}
.fccall.teal{background:var(--accent-soft);border-color:#cfe6e4;color:var(--accent-d)}
.fccall.green{background:#E8F2EA;border-color:#bfe0c8;color:var(--green)}
.ctlist{margin-top:8px;border-top:1px dashed #e6b5ae;padding-top:6px}
.ctrow{display:flex;align-items:center;gap:10px;font-size:12px;padding:3px 0}
.ctrow .cn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:var(--ink)}
.ctrow .cc{flex:none;width:140px;color:var(--faint);font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrow .cf{flex:none;width:80px;color:var(--mut);font-size:11px}
.ctrow .cp{flex:none;width:38px;text-align:right;font-weight:800;color:var(--ink)}
.ctrow .cl{flex:none;width:78px;text-align:right;font-size:10.5px;font-weight:800;color:var(--red)}
.ctrow .cl.ok{color:var(--green)}
.ctrow.late .cn{color:var(--red);font-weight:700}
/* main views */
.crumb{font-size:12px;color:var(--faint);font-weight:600;margin-bottom:6px}
.crumb b{color:var(--navy)}
.vh{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:26px;color:var(--navy);margin:0 0 14px}
.kpis{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 16px;min-width:120px}
.kpi-v{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:28px;line-height:1;color:var(--ink)}
.kpi-v.teal{color:var(--accent-d)}.kpi-v.red{color:var(--red)}.kpi-v.green{color:var(--green)}
.kpi-l{font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:5px}
.mh3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:18px 0 9px}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start}
@media(max-width:1100px){.cols2{grid-template-columns:1fr}}
.bnrow2{display:flex;align-items:center;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line2)}
.bnrow2 .d{flex:none;width:62px;text-align:right;font-weight:800;color:var(--red)}
.bnrow2 .o{flex:none;width:130px;font-size:11px;font-weight:700;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bnrow2 .w{flex:1;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow{display:flex;align-items:center;gap:12px;padding:9px 12px;border:1px solid var(--line);border-left-width:3px;border-radius:11px;margin-bottom:7px;cursor:pointer;background:#fff}
.brow:hover{box-shadow:var(--shadow)}
.brow.red{border-left-color:var(--red)}.brow.amber{border-left-color:var(--amber)}.brow.ok{border-left-color:var(--green)}
.brow .bsp{flex:none;width:64px;font-weight:800;color:var(--navy);font-size:14px}
.brow .bf{flex:none;width:46px;font-weight:800;color:var(--accent-d);text-align:right}
.brow .bt{flex:1;min-width:60px;position:relative;height:12px;border-radius:6px;background:#eef1f4;overflow:hidden}
.brow .bt .need{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,#eccfc9,#eccfc9 4px,#f6e1dc 4px,#f6e1dc 8px)}
.brow .bt .done{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent-d))}
.brow .bhold{flex:none;width:230px;font-size:11px;color:var(--mut);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .bhold b{color:var(--red)}
.brow .blg{flex:none;width:54px;text-align:right;font-weight:800;font-size:12px;color:var(--red)}
.brow .blg.ok{color:var(--green)}
.critcall{background:var(--red-bg);border:1px solid #e6b5ae;border-radius:11px;padding:11px 14px;font-size:13px;color:var(--ink);margin-bottom:14px;line-height:1.5}
.critcall b{color:var(--red)}
.gbar2{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--mut);font-weight:600;margin:6px 0 8px;flex-wrap:wrap}
.gbar2 b{color:var(--navy)}
.gbar2 .sp{flex:1}
.gbtn{background:var(--navy);color:#fff;border-radius:8px;padding:7px 13px;font-weight:700;font-size:12px;cursor:pointer}
.gbtn:hover{filter:brightness(1.1)}
.gbtn.alt{background:var(--bg);color:var(--accent-d);border:1px solid var(--line)}
.mainframe{width:100%;height:calc(100vh - 320px);min-height:460px;border:1px solid var(--line);border-radius:12px;background:#fff;display:block}
.mnote{font-size:11.5px;color:var(--faint);line-height:1.6;margin-top:22px;border-top:1px solid var(--line2);padding-top:12px}
.top .lg{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;font-family:'Cormorant',Georgia,serif}
.top .nm{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:22px;line-height:1}
.top .nm small{font-family:'Jost',sans-serif;display:block;font-size:11px;color:#9db4c6;font-weight:500;margin-top:2px}
.principle{background:var(--accent-soft);border:1px solid #cfe6e4;border-radius:13px;padding:11px 14px;font-size:12px;color:var(--accent-d);font-weight:600;line-height:1.5;margin-bottom:14px}
.principle b{color:var(--navy)}

.card{background:var(--card);border-radius:18px;box-shadow:var(--shadow)}
.lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:20px 4px 10px}

/* портфель-сводка */
.psum{padding:16px 18px}
.psum .ph{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.psum .pbig{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:44px;line-height:.9;color:var(--accent-d)}
.psum .pp{font-size:13.5px;color:var(--mut);font-weight:600}.psum .pp b{color:var(--ink)}
.psum .plag{margin-left:auto;font-size:12px;font-weight:800;border-radius:999px;padding:5px 12px;background:var(--red-bg);color:var(--red)}
.dual{height:14px;border-radius:8px;background:#e7edf2;position:relative;overflow:hidden;margin:13px 0 6px}
.dual .pl{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(90deg,#cdd6df,#cdd6df 5px,#dde4ec 5px,#dde4ec 10px)}
.dual .fl{position:absolute;left:0;top:0;bottom:0;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent-d))}
.psub{font-size:11.5px;color:var(--faint);font-weight:600}

/* узкие места портфеля */
.bnport{margin-top:13px;border-top:1px solid var(--line2);padding-top:11px}
.bnh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-d);margin-bottom:8px}
.bnrow{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
.bnrow .bd{flex:none;font-weight:800;color:var(--red);width:50px;text-align:right}
.bnrow .bo{flex:none;font-size:10.5px;font-weight:700;color:var(--faint);width:96px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bnrow .bw{flex:1;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

/* объект (details) */
details{margin-top:12px}
summary{list-style:none;cursor:pointer;outline:none}
summary::-webkit-details-marker{display:none}
.obj{overflow:hidden}
.osum{display:flex;align-items:center;gap:10px;padding:14px 16px}
.chev{flex:none;width:16px;color:var(--faint);font-size:13px;transition:transform .18s;font-weight:700}
details[open]>summary .chev{transform:rotate(90deg)}
.onm{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:21px;color:var(--navy);line-height:1.05;flex:1;min-width:0}
.ofact{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:24px;color:var(--accent-d);flex:none}
.obody{padding:0 16px 10px}
.obar{height:8px;border-radius:6px;background:#e7edf2;overflow:hidden;margin:2px 0 9px}
.obar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent-d));transition:width .2s}
.orow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;font-size:11.5px;font-weight:700;margin-bottom:8px}
.ostat{border-radius:999px;padding:3px 10px}
.ostat.bad{background:var(--red-bg);color:var(--red)}.ostat.ok{background:var(--green-bg);color:var(--green)}
.odn{border-radius:999px;padding:3px 10px;background:var(--amber-bg);color:var(--amber)}
.ofc{color:var(--gold-d);font-weight:700;font-size:11px;line-height:1.5}

.qn{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--faint);margin:11px 0 5px}

/* блок (details) */
.blk{border:1px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden;background:var(--card)}
.bsum{display:flex;align-items:center;gap:9px;padding:9px 11px}
.bnm{flex:none;width:74px;font-size:13px;font-weight:800;color:var(--navy)}
.btrack{flex:1;height:9px;border-radius:5px;background:#e7edf2;overflow:hidden;min-width:30px;position:relative}
.btrack i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent-d));transition:width .2s}
.bfact{flex:none;width:42px;text-align:right;font-size:13px;font-weight:800;color:var(--accent-d)}
.bdn{flex:none;font-size:10px;font-weight:800;border-radius:999px;padding:2px 7px;background:var(--red-bg);color:var(--red);white-space:nowrap}
.bdn.ok{background:var(--green-bg);color:var(--green)}
.bbody{padding:2px 11px 11px;border-top:1px solid var(--line2)}
.bmeta{font-size:11px;color:var(--mut);font-weight:600;margin:8px 0 4px}
.bmeta b{color:var(--ink)}
.bcrit{font-size:11.5px;font-weight:700;color:var(--red);margin:3px 0 8px}
.bcrit.ok{color:var(--green)}

/* раздел + работа */
.sec{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--gold-d);margin:10px 0 4px;display:flex;gap:6px;align-items:center}
.sec .sd{color:var(--faint);font-weight:700}
.wk{display:flex;align-items:center;gap:8px;padding:4px 0 4px 8px;border-left:2px solid transparent}
.wk.crit{border-left-color:var(--red);background:linear-gradient(90deg,var(--red-bg),transparent 70%)}
.wno{flex:none;width:20px;font-size:10px;font-weight:700;color:var(--faint);text-align:right}
.wnm{flex:1;font-size:12px;font-weight:600;min-width:0;line-height:1.25}
.wnm .wc{display:block;font-size:9.5px;font-weight:700;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wtr{flex:none;width:60px;height:7px;border-radius:4px;background:#e7edf2;overflow:hidden}
.wtr i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-d))}
.win{flex:none;width:46px}
.win input{width:100%;font-family:inherit;font-size:12px;font-weight:800;text-align:center;color:var(--accent-d);border:1.5px solid var(--line);border-radius:7px;padding:4px 2px;background:var(--bg)}
.win input:focus{outline:none;border-color:var(--accent);background:#fff}
.wdn{flex:none;width:40px;text-align:right;font-size:10px;font-weight:800}
.wdn.bad{color:var(--red)}.wdn.ok{color:var(--green)}

/* ===== Гантт (ядро ГПР: работы на временной оси) ===== */
.glegend{font-size:10px;color:var(--mut);font-weight:600;margin:9px 0 5px;display:flex;flex-wrap:wrap;gap:4px 12px;align-items:center}
.glegend i{font-style:normal}
.glegend .gp{display:inline-block;width:18px;height:9px;border-radius:3px;background:#eef1f4;border:1px solid #d9e0e7;vertical-align:middle;position:relative}
.glegend .gp::after{content:"";position:absolute;left:0;top:0;bottom:0;width:55%;border-radius:3px 0 0 3px;background:linear-gradient(90deg,var(--accent),var(--accent-d))}
.glegend .tdm{color:var(--red);font-weight:800}
.gantt{overflow-x:auto;overflow-y:hidden;border:1px solid var(--line2);border-radius:11px;background:#fff;-webkit-overflow-scrolling:touch}
.gscroll{position:relative}
.gaxis-row{display:flex;height:21px;border-bottom:1px solid var(--line2)}
.gaxis-sp{position:sticky;left:0;z-index:4;flex:none;width:162px;background:#fff;border-right:1px solid var(--line)}
.gaxis{position:relative;flex:none}
.gtick{position:absolute;top:0;bottom:0;border-left:1px solid var(--line2);font-size:9px;color:var(--faint);font-weight:700;padding-left:3px;line-height:21px;white-space:nowrap}
.gbody{position:relative}
.gtoday{position:absolute;top:0;bottom:0;border-left:1.5px dashed var(--red);z-index:1;pointer-events:none}
.gtoday span{position:absolute;top:1px;left:2px;font-size:8px;font-weight:800;color:var(--red);background:rgba(255,255,255,.82);padding:0 2px;border-radius:3px;white-space:nowrap}
.grow{display:flex;align-items:stretch;min-height:29px;border-top:1px solid var(--line2)}
.gname{position:sticky;left:0;z-index:2;flex:none;width:162px;background:#fff;border-right:1px solid var(--line);padding:3px 8px;display:flex;flex-direction:column;justify-content:center;gap:1px}
.gnt{font-size:11px;font-weight:600;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gno{color:var(--faint);font-weight:700;font-size:9.5px;margin-right:4px}
.gctl{display:flex;align-items:center;gap:6px}
.gctl input{width:42px;font-family:inherit;font-size:10.5px;font-weight:800;text-align:center;color:var(--accent-d);border:1px solid var(--line);border-radius:5px;padding:2px 0;background:var(--bg)}
.gctl input:focus{outline:none;border-color:var(--accent);background:#fff}
.gl{font-size:9.5px;font-weight:800}.gl.bad{color:var(--red)}.gl.ok{color:var(--green)}
.glane{position:relative;flex:none}
.gbar{position:absolute;top:50%;transform:translateY(-50%);height:13px;border-radius:4px;background:#eef1f4;border:1px solid #d9e0e7;overflow:hidden;min-width:3px}
.gf{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-d));transition:width .2s}
.grow.late .gbar{border-color:var(--amber)}
.grow.late .gf{background:linear-gradient(90deg,#e0a951,var(--amber))}
.grow.crit .gbar{border-color:var(--red);box-shadow:0 0 0 1px var(--red-bg)}
.grow.crit .gf{background:linear-gradient(90deg,#d8736a,var(--red))}
.grow.crit .gnt{color:var(--red);font-weight:700}
.gslip{position:absolute;top:50%;transform:translateY(-50%);height:13px;border-radius:0 3px 3px 0;background:repeating-linear-gradient(45deg,#f7e0db,#f7e0db 3px,#efc7c0 3px,#efc7c0 6px);border:1px dashed var(--red);border-left:none}
.gsec{position:sticky;left:0;z-index:2;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--gold-d);padding:6px 8px 2px;background:#fff;border-top:1px solid var(--line2)}
.gsec .sd{color:var(--red);font-weight:800}

/* ===== overview объекта: блоки по отставанию (план/факт) ===== */
.ovr-cap{font-size:11px;color:var(--accent-d);line-height:1.5;margin-bottom:10px;background:var(--accent-soft);border:1px solid #cfe6e4;border-radius:10px;padding:8px 11px}
.ovr-cap b{color:var(--navy)}
.ovr{border:1px solid var(--line);border-left-width:3px;border-radius:11px;padding:9px 13px;margin-bottom:7px;cursor:pointer;background:#fff;transition:border-color .15s,box-shadow .15s}
.ovr:hover{box-shadow:var(--shadow)}
.ovr.crit{border-left-color:var(--red)}
.ovr.late{border-left-color:var(--amber)}
.ovr.ok{border-left-color:var(--green)}
.ovr-h{display:flex;align-items:baseline;gap:9px}
.ovr-sp{font-weight:800;color:var(--navy);font-size:15px}
.ovr-f{font-weight:800;color:var(--accent-d);font-size:16px}
.ovr-pl{font-size:11px;color:var(--faint);font-weight:600}
.ovr-lag{margin-left:auto;font-size:12px;font-weight:800;color:var(--red)}
.ovr.ok .ovr-lag{color:var(--green)}
.ovr-bar{position:relative;height:12px;border-radius:6px;background:#eef1f4;overflow:hidden;margin:8px 0 6px}
.ovr-need{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,#eccfc9,#eccfc9 4px,#f6e1dc 4px,#f6e1dc 8px)}
.ovr-done{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent-d))}
.ovr-btm{font-size:10.5px;color:var(--mut);font-weight:600}
.ovr-btm b{color:var(--red)}

/* ===== реальный ГПР из MS Project (iframe) ===== */
.mpp-badge{background:var(--navy);color:#fff;border-radius:5px;padding:1px 7px;font-size:9.5px;font-weight:800;white-space:nowrap}
.mpp-cap{font-size:11px;color:var(--accent-d);line-height:1.5;margin:8px 0;background:var(--accent-soft);border:1px solid #cfe6e4;border-radius:10px;padding:8px 11px}
.mpp-cap b{color:var(--navy)}
.mpp-open{display:inline-block;background:linear-gradient(120deg,var(--navy),var(--navy-d));color:#fff;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13px;cursor:pointer;margin:6px 0 2px}
.mpp-open:hover{filter:brightness(1.08)}
.mpp-link{display:inline-block;font-size:11px;color:var(--accent-d);font-weight:700;text-decoration:none;margin-left:12px}
/* полноэкранный оверлей реального ГПР */
#mppov{position:fixed;inset:0;z-index:300;background:#fff;display:none;flex-direction:column}
#mppov.on{display:flex}
#mppov .ovbar{flex:none;background:linear-gradient(120deg,var(--navy),var(--navy-d));color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:13.5px}
#mppov .ovx{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;font-size:13px}
#mppov .ovx:hover{background:rgba(255,255,255,.3)}
#mppov iframe{flex:1;border:none;width:100%;background:#fff}

/* ===== ДЕСКТОП: пульт во всю ширину экрана ===== */
@media(min-width:1000px){
  .wrap{padding:0 30px 64px}
  .top{margin:0 -30px 14px}
  .lbl{margin-left:2px;margin-right:2px}
  /* портфель: слева сводка/бары, справа критический путь */
  .psum{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);column-gap:32px;align-items:start;padding:20px 24px}
  .psum .ph,.psum .dual,.psum .psub{grid-column:1}
  .psum .bnport{grid-column:2;grid-row:1 / span 4;margin-top:0;border-top:none;border-left:1px solid var(--line2);padding:0 0 0 28px}
  /* статус-карточки блоков (overview) — адаптивная сетка */
  [data-ov]{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:8px}
  [data-ov] .ovr-cap{grid-column:1 / -1}
  /* список блоков по очередям — тоже сеткой (раскрытие компактное: кнопка ГПР) */
  [data-qs]{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:6px 16px;align-items:start}
  [data-qs] .qn{grid-column:1 / -1;margin-bottom:0}
  .obody{padding:0 18px 14px}
}
@media(min-width:1500px){
  [data-ov]{grid-template-columns:repeat(auto-fill,minmax(420px,1fr))}
}

.note{font-size:11.5px;color:var(--faint);text-align:center;margin-top:24px;line-height:1.7}
.note a{color:var(--accent-d);font-weight:700;text-decoration:none}
.legend{font-size:11px;color:var(--mut);line-height:1.6;margin-top:6px}
.legend b{color:var(--navy)}
</style>

const wkey=(oid,bi,wi)=>oid+'/'+bi+'/'+wi;
function save(){try{localStorage.setItem('gpr_fact_v2',JSON.stringify(FACT));}catch(e){}}
function resetDemo(){try{localStorage.removeItem('gpr_fact_v2');}catch(e){}location.reload();}

/* ===== базлайны (официальные блочные %, взвешенные по дням вверх) ===== */
DATA.portfolio.forEach(o=>{
  o.sumDays=0;o._f=0;o._p=0;
  o.blocks.forEach((b,bi)=>{
    b.idx=bi;
    b.sumDays=b.works.reduce((s,w)=>s+(w.days||0),0)||1;
    // дат-диапазон блока (для overview-Гантта)
    const DY=86400000;
    b.gd0=Math.min(...b.works.map(w=>Math.floor(Date.parse(w.start)/DY)));
    b.gd1=Math.max(...b.works.map(w=>Math.floor(Date.parse(w.end)/DY)));
    // критические работы блока: топ-3 по отставанию (>0)
    const ranked=b.works.map((w,wi)=>({wi,lag:w.lag||0})).filter(x=>x.lag>0).sort((a,b)=>b.lag-a.lag);
    b.critSet=new Set(ranked.slice(0,3).map(x=>x.wi));
    b.maxLag=ranked.length?ranked[0].lag:0;
    b.critName=ranked.length?b.works[ranked[0].wi].name:null;
    o.sumDays+=b.sumDays;o._f+=(b.fact||0)*b.sumDays;o._p+=(b.plan||0)*b.sumDays;
  });
  o.baseFact=o._f/o.sumDays;o.basePlan=o._p/o.sumDays;
  o.maxLag=Math.max(0,...o.blocks.map(b=>b.maxLag));
});
let PD=0,PF=0,PP=0;
DATA.portfolio.forEach(o=>{PD+=o.sumDays;PF+=o.baseFact*o.sumDays;PP+=o.basePlan*o.sumDays;});
const PORT={sumDays:PD,baseFact:PF/PD,basePlan:PP/PD};

/* ===== живой факт = отчётный baseline + Σ(правки×дни)/Σдни ===== */
const wfact=(oid,bi,wi,w)=>{const k=wkey(oid,bi,wi);return k in FACT?FACT[k]:w.fact;};
function deltaSum(works,oid,bi){let d=0;works.forEach((w,wi)=>{const k=wkey(oid,bi,wi);if(k in FACT)d+=(FACT[k]-w.fact)*(w.days||0);});return d;}
function blockFact(o,b){return clamp(b.fact+deltaSum(b.works,o.id,b.idx)/b.sumDays);}
function objFact(o){let d=0;o.blocks.forEach(b=>{d+=deltaSum(b.works,o.id,b.idx);});return clamp(o.baseFact+d/o.sumDays);}
function portFact(){let d=0;DATA.portfolio.forEach(o=>o.blocks.forEach(b=>{d+=deltaSum(b.works,o.id,b.idx);}));return clamp(PORT.baseFact+d/PORT.sumDays);}
function forecast(fact){return fact>=100?'✓ сдан':('при +'+RATE+'%/нед → 100% через ~'+Math.ceil((100-fact)/RATE)+' нед');}

/* ===== список узких мест ===== */
function topBottlenecks(n){
  const all=[];
  DATA.portfolio.forEach(o=>o.blocks.forEach(b=>b.works.forEach((w,wi)=>{
    if((w.lag||0)>0)all.push({lag:w.lag,name:w.name,o:o.id,spot:b.spot,sec:w.section});
  })));
  return all.sort((a,b)=>b.lag-a.lag).slice(0,n);
}

/* ===== навигация: дерево слева + детали справа · правда из MS Project ===== */
const OBJSHORT={atmo:'Атмосфера',aura:'Аура',keruen:'Керуен',aksai:'Аксай'};
let SEL={t:'portfolio'}, FILTER={q:'',bad:false};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const REF='2026-05-28', DAYMS=86400000;
const ru=iso=>iso?iso.split('-').reverse().join('.'):'—';
const dleft=(a,b)=>Math.round((Date.parse(b)-Date.parse(a))/DAYMS);

/* ---- готовность / критпуть / прогноз из .mpp ---- */
const mppOf=(oid,spot)=>MPP[oid+'/'+spot];
function blkPct(o,b){const m=mppOf(o.id,b.spot);return m?m.pct:(b.fact||0);}
function objPct(o){let n=0,d=0;o.blocks.forEach(b=>{const w=b.sumDays||1;n+=blkPct(o,b)*w;d+=w;});return d?Math.round(n/d):0;}
function portPctV(){let n=0,d=0;DATA.portfolio.forEach(o=>o.blocks.forEach(b=>{const w=b.sumDays||1;n+=blkPct(o,b)*w;d+=w;}));return d?Math.round(n/d):0;}
function overdue(o,b){const m=mppOf(o.id,b.spot);return m?m.ct.filter(t=>t.f&&t.f<REF&&t.p<100):[];}
function sevOf(o,b){const od=overdue(o,b).length,gap=b.plan-blkPct(o,b);return od>0?'red':(gap>5?'amber':'ok');}
function sevScore(o,b){return overdue(o,b).length*1000+Math.max(0,b.plan-blkPct(o,b));}
function blkFin(o,b){const m=mppOf(o.id,b.spot);return m?m.finish:null;}
function objFin(o){let f=null;o.blocks.forEach(b=>{const x=blkFin(o,b);if(x&&(!f||x>f))f=x;});return f;}
function portFinV(){let f=null;DATA.portfolio.forEach(o=>o.blocks.forEach(b=>{const x=blkFin(o,b);if(x&&(!f||x>f))f=x;}));return f;}
function objOd(o){let n=0;o.blocks.forEach(b=>n+=overdue(o,b).length);return n;}
function verdict(pct,fin,od){
  if(pct>=100)return {t:'✓ сдан',c:'green'};
  if(fin&&fin<REF)return {t:'⚠ просрочка планового срока ('+ru(fin)+')'+(od?' · '+od+' крит.работ не закрыто':''),c:'red'};
  const dl=fin?dleft(REF,fin):null;
  return {t:'плановая сдача '+ru(fin)+(dl!=null?' (через '+dl+' дн)':'')+' · готовность '+pct+'%'+(od?' · ⚠'+od+' крит.просрочено':''),c:od?'amber':'teal'};
}
function critNow(limit){const a=[];DATA.portfolio.forEach(o=>o.blocks.forEach(b=>overdue(o,b).forEach(t=>a.push({o,b,t,late:dleft(t.f,REF)}))));return a.sort((x,y)=>y.late-x.late).slice(0,limit);}
function systemic(){const c={};DATA.portfolio.forEach(o=>o.blocks.forEach(b=>{const m=mppOf(o.id,b.spot);if(!m)return;[...new Set(m.ct.map(t=>t.c))].forEach(k=>{c[k]=(c[k]||0)+1;});}));return Object.entries(c).sort((a,b)=>b[1]-a[1]);}

/* ---- дерево слева (с фильтром/поиском) ---- */
function setFilter(q,bad){if(q!=null)FILTER.q=q;if(bad!=null)FILTER.bad=bad;buildSidebar();if(q!=null){const i=document.getElementById('navq');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}}
function blkMatch(o,b){const q=FILTER.q.trim().toLowerCase();if(q&&!(('«'+b.spot+'»').toLowerCase().includes(q)||o.object.toLowerCase().includes(q)))return false;if(FILTER.bad&&sevOf(o,b)==='ok')return false;return true;}
function objDot(o){return objOd(o)>0?'red':((o.basePlan-objPct(o))>5?'amber':'ok');}
function buildSidebar(){
  const filtering=!!(FILTER.q.trim()||FILTER.bad);
  let h=`<div class="navf"><input id="navq" placeholder="поиск блока / ЖК…" value="${esc(FILTER.q)}" oninput="setFilter(this.value,null)"><label class="navc"><input type="checkbox" ${FILTER.bad?'checked':''} onchange="setFilter(null,this.checked)"> только проблемные</label></div>`;
  h+=`<div class="nav-item nav-root ${SEL.t==='portfolio'?'on':''}" onclick="select('portfolio')"><span class="nav-ic">▦</span><span class="nav-nm">Портфель</span><span class="nav-pct">${portPctV()}%</span></div>`;
  DATA.portfolio.forEach(o=>{
    const mb=[...o.blocks].filter(b=>blkMatch(o,b)).sort((x,y)=>sevScore(o,y)-sevScore(o,x));
    if(filtering&&!mb.length)return;
    const open=(SEL.oid===o.id)||filtering;
    h+=`<div class="nav-obj"><div class="nav-item nav-o ${SEL.t==='object'&&SEL.oid===o.id?'on':''}" onclick="select('object','${o.id}')">
        <span class="nav-chev ${open?'rot':''}" onclick="navToggle(event,'${o.id}')">›</span>
        <span class="nav-dot ${objDot(o)}"></span><span class="nav-nm">${esc(o.object.replace('ЖК ',''))}</span><span class="nav-pct">${objPct(o)}%</span></div>
      <div class="nav-blocks ${open?'open':''}" id="nb-${o.id}">`;
    mb.forEach(b=>{const od=overdue(o,b).length;
      h+=`<div class="nav-item nav-b ${SEL.t==='block'&&SEL.oid===o.id&&SEL.bi===b.idx?'on':''}" onclick="select('block','${o.id}',${b.idx})">
        <span class="nav-dot ${sevOf(o,b)}"></span><span class="nav-nm">«${esc(b.spot)}»</span>
        <span class="nav-pct">${blkPct(o,b)}%</span><span class="nav-lag ${od?'bad':''}">${od?'⚠'+od:'✓'}</span></div>`;});
    h+=`</div></div>`;
  });
  document.getElementById('side').innerHTML=h;
}
function navToggle(e,oid){e.stopPropagation();const el=document.getElementById('nb-'+oid);if(el)el.classList.toggle('open');e.currentTarget.classList.toggle('rot');}
function select(t,oid,bi){SEL={t:t,oid:oid,bi:bi};buildSidebar();renderMain();const m=document.getElementById('main');if(m)m.scrollTop=0;}

function kpi(l,v,cls){return `<div class="kpi"><div class="kpi-v ${cls||''}">${v}</div><div class="kpi-l">${l}</div></div>`;}
function dualBar(plan,fact){return `<div class="dual" style="max-width:520px"><div class="pl" style="width:${plan}%"></div><div class="fl" style="width:${fact}%"></div></div>`;}

function renderMain(){
  const m=document.getElementById('main');
  if(SEL.t==='object'){const o=DATA.portfolio.find(x=>x.id===SEL.oid);m.innerHTML=viewObject(o);return;}
  if(SEL.t==='block'){const o=DATA.portfolio.find(x=>x.id===SEL.oid);m.innerHTML=viewBlock(o,o.blocks[SEL.bi]);return;}
  m.innerHTML=viewPortfolio();
}

function blockRow(o,b){
  const pct=blkPct(o,b),sev=sevOf(o,b),od=overdue(o,b),m=mppOf(o.id,b.spot);
  const hold=od.length?('держит: <b>'+esc(od[0].n)+'</b>'+(od.length>1?' +'+(od.length-1):'')):(m?'критпуть: '+esc(m.crit):'—');
  return `<div class="brow ${sev}" onclick="select('block','${o.id}',${b.idx})">
    <span class="bsp">«${esc(b.spot)}»</span>
    <span class="bt"><i class="need" style="width:${b.plan}%"></i><i class="done" style="width:${pct}%"></i></span>
    <span class="bf">${pct}%</span><span class="bhold">${hold}</span>
    <span class="blg ${od.length?'':'ok'}">${od.length?'⚠'+od.length:'✓'}</span></div>`;
}

function viewPortfolio(){
  const pf=portPctV(),pp=R(PORT.basePlan),lag=pp-pf,fin=portFinV(),od=critNow(9999).length;
  const v=verdict(pf,fin,od);
  const cn=critNow(12).map(x=>`<div class="bnrow2 clk" onclick="select('block','${x.o.id}',${x.b.idx})"><span class="d">−${x.late} дн</span><span class="o">${OBJSHORT[x.o.id]} «${esc(x.b.spot)}»</span><span class="w">${esc(x.t.n)} · ${x.t.p}%</span></div>`).join('')||'<div class="mnote">просроченных работ на критпути нет 🎉</div>';
  const sys=systemic().slice(0,8).map(([c,n])=>`<div class="bnrow2"><span class="d">${n} бл.</span><span class="w">${esc(c)}</span></div>`).join('');
  const nb=DATA.portfolio.reduce((s,o)=>s+o.blocks.length,0);
  const nw=DATA.portfolio.reduce((s,o)=>s+o.blocks.reduce((t,b)=>t+b.works.length,0),0);
  return `<div class="crumb"><b>Портфель</b></div>
    <div class="vh">Портфель · ${DATA.portfolio.length} ЖК</div>
    <div class="kpis">${kpi('Готовность',pf+'%','teal')}${kpi('План',pp+'%')}${kpi('Отставание',lag>0?'−'+lag+' пп':'в графике',lag>0?'red':'green')}${kpi('Блоков',''+nb)}${kpi('Работ',''+nw)}</div>
    ${dualBar(pp,pf)}
    <div class="fccall ${v.c}">📅 <b>Прогноз портфеля:</b> ${v.t}</div>
    <div class="cols2" style="margin-top:18px">
      <div><div class="mh3">🔴 Что критично сейчас · просрочено на критическом пути</div>${cn}</div>
      <div><div class="mh3">Системные узкие места · разделы на критпути (× блоков)</div>${sys}
        <div class="mh3" style="margin-top:16px">Блоки, требующие внимания</div>${allWorst(12)}</div>
    </div>
    <div class="mnote"><b>Правда из MS Project:</b> готовность, связи Finish→Start и критический путь — из .mpp. План — из отчёта 28.05.2026. Слева дерево (точка = риск), выбери блок → реальный ГПР. ATLAS · ATAMŪRA GROUP.</div>`;
}
function allWorst(n){const a=[];DATA.portfolio.forEach(o=>o.blocks.forEach(b=>a.push({o,b})));return a.sort((x,y)=>sevScore(y.o,y.b)-sevScore(x.o,x.b)).slice(0,n).map(x=>blockRow(x.o,x.b)).join('');}

function viewObject(o){
  const f=objPct(o),pp=R(o.basePlan),lag=pp-f,fin=objFin(o),od=objOd(o);
  const v=verdict(f,fin,od);
  const rows=[...o.blocks].sort((a,b)=>sevScore(o,b)-sevScore(o,a)).map(b=>blockRow(o,b)).join('');
  return `<div class="crumb"><span onclick="select('portfolio')" class="lk">Портфель</span> / <b>${esc(o.object)}</b></div>
    <div class="vh">${esc(o.object)}</div>
    <div class="kpis">${kpi('Готовность',f+'%','teal')}${kpi('План',pp+'%')}${kpi('Отставание',lag>0?'−'+lag+' пп':'в графике',lag>0?'red':'green')}${kpi('План. сдача',ru(fin))}${kpi('Блоков',''+o.blocks.length)}</div>
    <div class="fccall ${v.c}">📅 <b>Прогноз ${esc(o.object.replace('ЖК ',''))}:</b> ${v.t}</div>
    <div class="mh3">Блоки — сначала самые проблемные · клик → реальный ГПР</div>
    ${rows}`;
}

function viewBlock(o,b){
  const key=o.id+'/'+b.spot, mp=MPP[key];
  const crumb=`<div class="crumb"><span onclick="select('portfolio')" class="lk">Портфель</span> / <span onclick="select('object','${o.id}')" class="lk">${esc(o.object)}</span> / <b>Пятно «${esc(b.spot)}»</b></div>`;
  const head=`<div class="vh">${esc(o.object)} · Пятно «${esc(b.spot)}»</div>`;
  if(!mp)return crumb+head+`<div class="kpis">${kpi('План',b.plan+'%')}${kpi('Факт',b.fact+'%','teal')}</div><div class="critcall">Реальный ГПР из .mpp для этого блока пока не подключён.</div>`;
  const od=overdue(o,b),v=verdict(mp.pct,mp.finish,od.length),lagpp=b.plan-mp.pct;
  const kpis=`<div class="kpis">${kpi('Готовность',mp.pct+'%','teal')}${kpi('План',b.plan+'%')}${kpi('Отставание',lagpp>0?'−'+lagpp+' пп':'в графике',lagpp>0?'red':'green')}${kpi('План. сдача',ru(mp.finish))}${kpi('Работ',''+b.works.length)}</div>`;
  const fc=`<div class="fccall ${v.c}">📅 <b>Прогноз:</b> ${v.t}</div>`;
  const ctlist=mp.ct.map(t=>{const late=t.f&&t.f<REF&&t.p<100;return `<div class="ctrow ${late?'late':''}"><span class="cn">${esc(t.n)}</span><span class="cc">${esc(t.c)}</span><span class="cf">${ru(t.f)}</span><span class="cp">${t.p}%</span>${late?'<span class="cl">⚠ просроч.</span>':'<span class="cl ok">в срок</span>'}</div>`;}).join('');
  const crit=`<div class="critcall">🔴 <b>Критический путь (MS Project)</b> · ${mp.links} связей Finish→Start · наведи на работу в графике — подсветятся её связи<div class="ctlist">${ctlist}</div></div>`;
  const bar=`<div class="gbar2"><b>📐 Реальный ГПР из MS Project</b><span class="sp"></span><button class="gbtn" onclick="openMpp('${mp.src}')">⤢ во весь экран</button> <a class="gbtn alt" href="${mp.src}" target="_blank" rel="noopener" style="text-decoration:none">в отдельной вкладке ↗</a></div>`;
  return crumb+head+kpis+fc+crit+bar+`<iframe class="mainframe" src="${mp.src}" title="Реальный ГПР (MS Project)"></iframe>`;
}

/* полноэкранный оверлей реального ГПР */
function openMpp(src){
  let o=document.getElementById('mppov');
  if(!o){o=document.createElement('div');o.id='mppov';
    o.innerHTML='<div class="ovbar"><span id="mppovt">Реальный ГПР · MS Project</span><button class="ovx" onclick="closeMpp()">✕ закрыть (Esc)</button></div><iframe id="mppovf" title="Реальный ГПР"></iframe>';
    document.body.appendChild(o);}
  const f=document.getElementById('mppovf');
  f.onload=()=>{try{document.getElementById('mppovt').textContent=f.contentDocument.title;}catch(e){}};
  f.src=src;o.classList.add('on');
}
function closeMpp(){const o=document.getElementById('mppov');if(!o)return;o.classList.remove('on');document.getElementById('mppovf').src='about:blank';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMpp();});

buildSidebar();renderMain();
</script>
</body>
</html>
