<!DOCTYPE html>
<html lang="ru" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#284157">
<title>ATLAS · Снабжение — оплата-радар</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5EE;--card:#FBFBFB;--ink:#1E1E1E;--mut:#6E6E6E;--faint:#9C9486;--line:#E0DDD3;
  --accent:#007484;--accent-d:#005763;--accent-soft:#E0EEF0;--gold:#CFB372;--gold-soft:#EFE6CD;--gold-ink:#7A5E1E;
  --navy:#284157;--green:#3E9B66;--green-bg:#E7F1E7;--amber:#C07A1E;--amber-bg:#F5E9D2;--red:#C7544A;--red-bg:#F6E4DF;--blue:#3C6E8B;--blue-bg:#E4ECF1;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:'Cormorant',Georgia,serif}.tnum{font-variant-numeric:tabular-nums}
a{color:inherit}
.top{background:var(--navy);color:#fff;position:sticky;top:0;z-index:20}
.top .row{max-width:1180px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lg{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center}
.nm{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:21px;line-height:1}
.sb{font-size:11.5px;color:#A9BBC9;margin-top:2px}
.top .meta{margin-left:auto;font-size:12.5px;color:#A9BBC9;text-align:right}.top .meta b{color:#fff}
.top a.back{font-size:12.5px;color:#A9BBC9;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:9px}
.top a.back:hover{color:#fff;border-color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:24px 26px 64px}
.obsnote{font-size:12px;color:#8a6420;background:var(--gold-soft);border:1px solid #e2d2a6;border-radius:10px;padding:9px 14px;display:inline-block;margin-bottom:18px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-ink);margin:26px 2px 12px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px 19px;border-top:3px solid var(--accent)}
.kpi.a{border-top-color:var(--amber)}.kpi.r{border-top-color:var(--red)}.kpi.g{border-top-color:var(--green)}
.kpi .l{font-size:12px;color:var(--mut);margin-bottom:8px}
.kpi .v{font-family:'Cormorant',Georgia,serif;font-size:34px;font-weight:700;line-height:1}.kpi .v small{font-size:14px;color:var(--faint);font-weight:600;font-family:'Jost',sans-serif}
.kpi .h{font-size:11.5px;color:var(--faint);margin-top:7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.card h3{font-size:13px;font-weight:600;margin-bottom:14px}
.agerow{display:grid;grid-template-columns:54px 1fr 38px;gap:10px;align-items:center;margin:9px 0}
.agerow .lab{font-size:12px;color:var(--mut);text-align:right}
.agebar{height:14px;border-radius:999px;background:var(--line);overflow:hidden}
.agebar i{display:block;height:100%;border-radius:999px}
.agerow .c{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:17px;text-align:right}
.lrow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.lrow:last-child{border-bottom:none}.lrow .c{font-weight:600;color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:10px 12px;border-bottom:1px solid #ECEAE2;vertical-align:middle}
tr:last-child td{border-bottom:none}
.days{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:18px}
.chip{font-size:10.5px;font-weight:600;border-radius:999px;padding:2px 9px;white-space:nowrap;background:#EFEBDF;color:var(--mut)}
.lnk{font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap}.lnk:hover{text-decoration:underline}
.foot{margin-top:22px;font-size:12px;color:var(--faint);line-height:1.6}
.btn{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:10px;border:1px solid var(--line);color:var(--ink);background:var(--card);cursor:pointer}
.btn:hover{border-color:var(--ink)}
.err{background:var(--red-bg);border:1px solid #e2b3ac;color:#8a2f27;border-radius:12px;padding:14px 18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.filterbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fchip{font-size:12px;border:1px solid var(--line);background:var(--card);padding:7px 13px;border-radius:999px;color:var(--mut);cursor:pointer}
.fchip[aria-pressed=true]{background:var(--accent);color:#fff;border-color:var(--accent)}
.fchip b{font-weight:700}
.vtab{font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--card);padding:8px 16px;border-radius:11px;color:var(--mut);cursor:pointer}
.vtab[aria-pressed=true]{background:var(--navy);color:#fff;border-color:var(--navy)}
@media(max-width:820px){.kpis{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}.hidesm{display:none}}
</style>
</head>
<body>
  <div class="top"><div class="row">
    <div class="lg" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#284157" stroke-width="2" stroke-linejoin="round"><path d="M3 7.5l9-4.5 9 4.5v9l-9 4.5-9-4.5v-9z"/><path d="M3 7.5l9 4.5 9-4.5M12 12v9"/></svg></div>
    <div><div class="nm">ATLAS · оплата-радар</div><div class="sb" id="sub">узкое место оплаты · читаем Bitrix, не пишем</div></div>
    <div class="meta" id="meta">—</div>
    <a class="back" href="/today">сводка дня</a>
    <a class="back" href="/cycle">цикл закупа</a>
    <a class="back" href="/gaps">не подано?</a>
    <a class="back" href="/">← рабочее пространство</a>
  </div></div>

  <div class="wrap">
    <span class="obsnote">● <b>Read-only</b> — слой ATLAS поверх вашей воронки Bitrix. В CRM ничего не записывается.</span>
    <div class="filterbar" id="viewtabs" style="margin-top:14px"></div>
    <div id="body"><p style="color:var(--mut)">Загружаю срез из Bitrix… <span style="color:var(--faint)">(первый раз до ~15&nbsp;c, дальше мгновенно из кэша)</span></p></div>
    <div class="foot" id="foot"></div>
  </div>

<script>
const dcol = d => d>=15?'var(--red)':d>=8?'var(--amber)':d>=4?'var(--gold-ink)':'var(--accent)';
const AGECOL = {'0–3':'var(--green)','4–7':'var(--accent)','8–14':'var(--gold)','15–30':'var(--amber)','30+':'var(--red)'};
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
let DATA=null, curObj='Все', curView='payment';
function renderTable(){
  const rows = curObj==='Все'?DATA.rows:DATA.rows.filter(r=>r.object===curObj);
  document.getElementById('tblcount').textContent = rows.length;
  document.getElementById('tbody').innerHTML = rows.map(r=>`<tr>
    <td>${esc(r.title).slice(0,72)}</td>
    <td class="hidesm"><span class="chip">${esc(r.object)}</span></td>
    <td class="hidesm"><span class="chip">${esc(r.stage)}</span></td>
    <td><span class="days" style="color:${dcol(r.days)}">${r.days}</span></td>
    <td><a class="lnk" href="${r.url}" target="_blank" rel="noopener">Bitrix ↗</a></td></tr>`).join('')
    || '<tr><td colspan="5" style="color:var(--faint);padding:18px 12px">Нет заявок по этому объекту.</td></tr>';
}
function setObj(o){ curObj=o; document.querySelectorAll('.fchip').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.o===o))); renderTable(); }
async function load(view){
  if(view)curView=view;
  renderViewTabs();
  let d;
  try{ d = await (await fetch('/api/bitrix/radar?view='+curView)).json(); }
  catch(e){ document.getElementById('body').innerHTML='<div class="err">Не удалось загрузить: '+esc(e)+'</div>'; return; }
  if(d.error){ document.getElementById('body').innerHTML='<div class="err">Bitrix: '+esc(d.error)+'</div>'; return; }
  DATA=d; curObj='Все';
  document.getElementById('sub').textContent = d.funnel + ' · читаем Bitrix, не пишем';
  document.getElementById('meta').innerHTML = (d.portal?d.portal.replace(/^https?:\/\//,''):'') + ' · срез на <b>'+d.today+'</b>';
  const maxAge = Math.max(1, ...d.aging.map(a=>a[1]));
  const kpis = `<div class="kpis">
    <div class="kpi a"><div class="l">Заявок ${esc(d.label||'на оплате')}</div><div class="v tnum">${d.count}</div><div class="h">${d.active_total!=null?('из '+d.active_total+' активных'):'в воронке «СЗ на закуп»'}</div></div>
    <div class="kpi"><div class="l">Медиана простоя</div><div class="v tnum">${d.median_days}<small> дн</small></div><div class="h">в текущей стадии</div></div>
    <div class="kpi r"><div class="l">Дольше всех</div><div class="v tnum">${d.max_days}<small> дн</small></div><div class="h">рекорд простоя в стадии</div></div>
    <div class="kpi r"><div class="l">Просрочено &gt; 14 дн</div><div class="v tnum">${d.overdue14}</div><div class="h">заявок «зависли» надолго</div></div>
  </div>`;
  const aging = `<div class="card"><h3>Сколько висят (дней в стадии)</h3>${d.aging.map(([lab,c])=>`<div class="agerow"><div class="lab">${lab} дн</div><div class="agebar"><i style="width:${Math.round(c/maxAge*100)}%;background:${AGECOL[lab]}"></i></div><div class="c">${c}</div></div>`).join('')}</div>`;
  const subs = `<div class="card"><h3>Подстадии</h3>${d.substages.map(([nm,c])=>`<div class="lrow"><span>${esc(nm)}</span><span class="c tnum">${c}</span></div>`).join('')}${d.assignees&&d.assignees.length?'<h3 style="margin-top:16px">Кто согласует (по числу зависших)</h3>'+d.assignees.map(a=>`<div class="lrow"><span>${esc(a.name)}</span><span class="c tnum">${a.count} <span style="color:var(--faint);font-weight:400">· до ${a.max} дн</span></span></div>`).join(''):''}</div>`;
  const objs = `<div class="card"><h3>По объектам</h3>${(d.objects||[]).map(o=>`<div class="lrow"><span>${esc(o.name)}</span><span class="c tnum">${o.count}${o.stuck30?' <span style="color:var(--red);font-weight:400">· '+o.stuck30+' &gt;30дн</span>':''}</span></div>`).join('')}</div>`;
  const chips = `<div class="filterbar"><button class="fchip" data-o="Все" aria-pressed="true" onclick="setObj('Все')">Все объекты</button>${(d.objects||[]).map(o=>`<button class="fchip" data-o="${esc(o.name)}" aria-pressed="false" onclick="setObj(this.dataset.o)">${esc(o.name)} <b>${o.count}</b></button>`).join('')}</div>`;
  const table = `<div class="card" style="padding:0"><table><thead><tr><th>Заявка</th><th class="hidesm">Объект</th><th class="hidesm">Стадия</th><th>Дней</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div>`;
  document.getElementById('body').innerHTML = kpis
    + '<div class="eyebrow">Распределение, согласующие и объекты</div><div class="grid3">'+aging+subs+objs+'</div>'
    + `<div class="eyebrow">Дольше всех ${esc(d.label||'')} · <span id="tblcount" style="color:var(--gold-ink)"></span> заявок</div>`
    + chips + table;
  renderTable();
  document.getElementById('foot').innerHTML = `Источник: Bitrix smart-process #178, воронка «СЗ на закуп для стройки» · только чтение · «дней» = в текущей стадии оплаты · объект распознан из заголовка (эвристика). <button class="btn" onclick="load()">Обновить</button>`;
}
function renderViewTabs(){
  const V=[['payment','Оплата'],['closing','Закрывающие документы']];
  const el=document.getElementById('viewtabs'); if(!el)return;
  el.innerHTML=V.map(([k,n])=>`<button class="vtab" data-v="${k}" aria-pressed="${k===curView}" onclick="setView(this.dataset.v)">${n}</button>`).join('');
}
function setView(v){ if(v===curView)return; load(v); }
load();
</script>
</body>
</html>
