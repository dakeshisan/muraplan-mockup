<!DOCTYPE html>
<html lang="ru" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#284157">
<title>ATLAS · Снабжение — сводка дня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5EE;--card:#FBFBFB;--ink:#1E1E1E;--mut:#6E6E6E;--faint:#9C9486;--line:#E0DDD3;
  --accent:#007484;--gold:#CFB372;--gold-soft:#EFE6CD;--gold-ink:#7A5E1E;--navy:#284157;
  --green:#3E9B66;--green-bg:#E7F1E7;--amber:#C07A1E;--amber-bg:#F5E9D2;--red:#C7544A;--red-bg:#F6E4DF;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.tnum{font-variant-numeric:tabular-nums}
.top{background:var(--navy);color:#fff;position:sticky;top:0;z-index:20}
.top .row{max-width:1080px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lg{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center}
.nm{font-family:'Cormorant',Georgia,serif;font-weight:700;font-size:21px;line-height:1}
.sb{font-size:11.5px;color:#A9BBC9;margin-top:2px}
.top .meta{margin-left:auto;font-size:12.5px;color:#A9BBC9}.top .meta b{color:#fff}
.top a.back{font-size:12px;color:#A9BBC9;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:6px 11px;border-radius:9px}
.top a.back:hover{color:#fff;border-color:#fff}
.wrap{max-width:1080px;margin:0 auto;padding:24px 26px 64px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;border-left:3px solid var(--line);text-decoration:none;color:inherit;display:block}
a.kpi:hover{border-color:var(--ink)}
.kpi.red{border-left-color:var(--red)}.kpi.amber{border-left-color:var(--amber)}.kpi.green{border-left-color:var(--green)}
.kpi .v{font-family:'Cormorant',Georgia,serif;font-size:30px;font-weight:700;line-height:1}
.kpi .v.red{color:var(--red)}.kpi .v.amber{color:var(--amber)}.kpi .v.green{color:var(--green)}
.kpi .l{font-size:11.5px;color:var(--mut);margin-top:6px}
.kpi .s{font-size:11px;color:var(--faint);margin-top:3px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.04em;margin:26px 2px 12px;display:flex;align-items:center;gap:10px}
.eyebrow .pill{font-size:11px;font-weight:600;border-radius:999px;padding:3px 10px;background:var(--gold-soft);color:var(--gold-ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.orow{display:grid;grid-template-columns:1fr 140px 150px;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line)}
.orow:last-child{border-bottom:none}.orow.overdue{background:var(--red-bg)}
.mat{font-weight:600;font-size:13.5px}.wk{font-size:11.5px;color:var(--mut);margin-top:1px}.wk b{color:var(--accent);font-weight:600}
.badge{font-size:10.5px;font-weight:600;border-radius:999px;padding:3px 10px;white-space:nowrap;text-align:center;justify-self:start}
.b-overdue{background:var(--red-bg);color:var(--red)}.b-now{background:var(--amber-bg);color:var(--amber)}
.due{font-size:12.5px;text-align:right;white-space:nowrap}.due b{font-variant-numeric:tabular-nums}
.rrow{display:grid;grid-template-columns:1fr 130px 130px 150px;gap:12px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:none}.rrow.h{background:#F1EEE6;font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.03em}
.rrow .n{font-variant-numeric:tabular-nums;font-weight:600}.rrow .n.red{color:var(--red)}.rrow .n.amber{color:var(--amber)}.rrow .n.zero{color:var(--faint);font-weight:400}
.empty{padding:16px;color:var(--mut);font-size:13px}
.foot{margin-top:24px;font-size:12px;color:var(--faint);line-height:1.6}
.btn{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:10px;border:1px solid var(--line);color:var(--ink);background:var(--card);cursor:pointer}.btn:hover{border-color:var(--ink)}
.err{background:var(--red-bg);border:1px solid #e2b3ac;color:#8a2f27;border-radius:12px;padding:14px 18px;margin-bottom:14px}
@media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}.orow{grid-template-columns:1fr 96px}.orow .obj,.orow .badge{display:none}.rrow{grid-template-columns:1fr 70px 70px}.rrow .last{display:none}}
</style>
</head>
<body>
  <div class="top"><div class="row">
    <div class="lg" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#284157" stroke-width="2" stroke-linejoin="round"><path d="M3 7.5l9-4.5 9 4.5v9l-9 4.5-9-4.5v-9z"/><path d="M3 7.5l9 4.5 9-4.5M12 12v9"/></svg></div>
    <div><div class="nm">ATLAS · сводка дня</div><div class="sb">что горит сегодня · все объекты · только чтение</div></div>
    <div class="meta" id="meta">—</div>
    <a class="back" href="/">рабочее пространство</a>
    <a class="back" href="/zakup">план закупа</a>
  </div></div>

  <div class="wrap">
    <div id="body"><p style="color:var(--mut)">Собираю сводку по всем объектам… <span style="color:var(--faint)">(первый раз до ~25&nbsp;c — греются срезы Bitrix и ГПР)</span></p></div>
    <div class="foot" id="foot"></div>
  </div>

<script>
const fdate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return d+'.'+m+'.'+y.slice(2);};
const pl=(n,a,b,c)=>{const x=n%10,h=n%100;return n+' '+(x===1&&h!==11?a:(x>=2&&x<=4&&(h<10||h>=20)?b:c));};
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function kpi(href,cls,v,vcls,label,sub){
  const inner=`<div class="v ${vcls||''} tnum">${v}</div><div class="l">${label}</div>${sub?`<div class="s">${sub}</div>`:''}`;
  return href?`<a class="kpi ${cls}" href="${href}">${inner}</a>`:`<div class="kpi ${cls}">${inner}</div>`;
}
async function load(){
  let d;
  try{ d=await(await fetch('/api/today')).json(); }
  catch(e){ document.getElementById('body').innerHTML='<div class="err">Не удалось загрузить: '+esc(e)+'</div>'; return; }
  document.getElementById('meta').innerHTML='сегодня <b>'+esc(d.today||'—')+'</b>';
  let html='';
  (d.errors||[]).forEach(e=>html+='<div class="err">⚠ '+esc(e)+'</div>');

  // KPI-плитки
  const pay=d.pay, clo=d.closing, plan=d.plan, gap=d.gaps;
  let tiles='';
  tiles+=kpi('/radar?view=payment', pay&&pay.over14?'red':'amber', pay?pay.count:'—', pay&&pay.over14?'red':'amber',
        'на оплате', pay?('медиана '+pl(pay.median,'день','дня','дней')+' · &gt;14дн: <b>'+pay.over14+'</b>'):'');
  tiles+=kpi('/radar?view=closing', clo&&clo.over14?'amber':'green', clo?clo.over14:'—', clo&&clo.over14?'amber':'green',
        'закрывающие &gt;14дн', clo?('всего в стадии: '+clo.count):'');
  tiles+=kpi('/zakup', plan&&plan.overdue?'red':'green', plan?plan.overdue:'—', plan&&plan.overdue?'red':'green',
        'просрочено по плану', plan?('сейчас (≤7дн): '+plan.now+' · ближайший '+fdate(plan.earliest)):'');
  tiles+=kpi('/gaps', gap&&gap.total?'amber':'green', gap?gap.total:'—', gap&&gap.total?'amber':'green',
        'возможно не подано', gap?'сверка плана с заявками':'');
  html+='<div class="kpis">'+tiles+'</div>';

  // Заказать на этой неделе
  const on=d.order_now||[];
  html+=`<div class="eyebrow">⏰ Заказать на этой неделе <span class="pill">${on.length?pl(on.length,'позиция','позиции','позиций'):'чисто'}</span></div>`;
  if(!on.length){
    html+='<div class="card"><div class="empty">Нет просроченных и срочных позиций — заказы под старты работ закрыты. 👍</div></div>';
  }else{
    const show=on.slice(0,15);
    html+='<div class="card">'+show.map(i=>`<div class="orow ${i.status==='overdue'?'overdue':''}">
        <div><div class="mat">${esc(i.material)}</div><div class="wk"><b>${esc(i.object)}</b> · под ${pl(i.count||1,'работу','работы','работ')}</div></div>
        <div><span class="badge ${i.status==='overdue'?'b-overdue':'b-now'}">${i.status==='overdue'?'просрочено':'на этой неделе'}</span></div>
        <div class="due">заказать до <b>${fdate(i.order_by)}</b></div>
      </div>`).join('')+'</div>';
    if(on.length>show.length) html+=`<div style="font-size:12px;color:var(--faint);margin-top:8px">…ещё ${on.length-show.length} — <a href="/zakup" style="color:var(--accent);text-decoration:none">весь план закупа →</a></div>`;
  }

  // Объекты под риском
  const risk=d.risk||[];
  if(risk.length){
    html+='<div class="eyebrow">🏗 Объекты под риском</div><div class="card">';
    html+='<div class="rrow h"><div>Объект</div><div class="n">просрочка плана</div><div class="n">не подано</div><div class="last" style="text-align:right">ближайший заказ</div></div>';
    html+=risk.map(r=>`<div class="rrow">
        <div style="font-weight:600">${esc(r.object)}</div>
        <div class="n ${r.overdue?'red':'zero'}">${r.overdue}</div>
        <div class="n ${r.gaps?'amber':'zero'}">${r.gaps}</div>
        <div class="last" style="text-align:right;font-variant-numeric:tabular-nums">${fdate(r.earliest)}</div>
      </div>`).join('')+'</div>';
  }
  document.getElementById('body').innerHTML=html;
  document.getElementById('foot').innerHTML='Сводка собрана из срезов: оплата-радар + закрывающие (Bitrix #178/4, только чтение) · план закупа по ГПР (даты «заказать-до» — оценки сроков поставки) · детектор «не подано» (эвристика по заголовкам заявок — сигнал «проверь»). Цифры кэшируются на 5 минут. <button class="btn" onclick="load()">Обновить</button>';
}
load();
</script>
</body>
</html>
